<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналітика — VetFuture</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8ecf0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
    header span { font-size: 13px; color: #6b7280; }

    .period-badge {
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
    }

    main { padding: 32px; max-width: 1200px; margin: 0 auto; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid #e8ecf0;
    }
    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .stat-card.green .value { color: #2e7d32; }
    .stat-card.red   .value { color: #c62828; }
    .stat-card.blue  .value { color: #1565c0; }

    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8ecf0;
      padding: 24px;
    }
    .chart-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 20px;
    }
    .chart-wrap { position: relative; height: 280px; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #9ca3af;
      font-size: 14px;
      gap: 8px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #2e7d32;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      main { padding: 16px; }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 Аналітика</h1>
  <span id="period-label" class="period-badge">Завантаження...</span>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card green">
      <div class="label">Завершені візити</div>
      <div class="value" id="stat-completed">—</div>
    </div>
    <div class="stat-card blue">
      <div class="label">Заплановані записи</div>
      <div class="value" id="stat-scheduled">—</div>
    </div>
    <div class="stat-card red">
      <div class="label">Скасовані</div>
      <div class="value" id="stat-cancelled">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Лікарів</div>
      <div class="value" id="stat-doctors">—</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Візити по днях (30 днів)</h3>
      <div class="chart-wrap">
        <div class="loading" id="loading-days"><div class="spinner"></div> Завантаження...</div>
        <canvas id="chart-days" style="display:none"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>По статусах</h3>
      <div class="chart-wrap">
        <div class="loading" id="loading-status"><div class="spinner"></div></div>
        <canvas id="chart-status" style="display:none"></canvas>
      </div>
    </div>
  </div>

  <div class="chart-card">
    <h3>Завершені візити по лікарях</h3>
    <div class="chart-wrap">
      <div class="loading" id="loading-doctors"><div class="spinner"></div> Завантаження...</div>
      <canvas id="chart-doctors" style="display:none"></canvas>
    </div>
  </div>
</main>

<script>
const COLORS = [
  '#2e7d32','#1565c0','#e65100','#6a1b9a',
  '#00838f','#ad1457','#558b2f','#4527a0'
];

async function loadAnalytics() {
  try {
    const res = await fetch('/api/analytics/summary');
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();

    document.getElementById('stat-completed').textContent = d.totals.completed_visits;
    document.getElementById('stat-scheduled').textContent  = d.totals.scheduled;
    document.getElementById('stat-cancelled').textContent  = d.totals.cancelled;
    document.getElementById('stat-doctors').textContent    = d.totals.doctors_count;
    document.getElementById('period-label').textContent    = `${d.period.from} — ${d.period.to}`;

    showChart('days', {
      type: 'bar',
      data: {
        labels: d.by_day.labels,
        datasets: [{
          label: 'Візити',
          data: d.by_day.values,
          backgroundColor: '#2e7d32',
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { ticks: { maxTicksLimit: 10 } } }
      }
    });

    showChart('status', {
      type: 'doughnut',
      data: {
        labels: d.by_status.labels,
        datasets: [{ data: d.by_status.values, backgroundColor: COLORS }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
      }
    });

    showChart('doctors', {
      type: 'bar',
      data: {
        labels: d.by_doctor.labels,
        datasets: [{
          label: 'Завершені візити',
          data: d.by_doctor.values,
          backgroundColor: COLORS,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
      }
    });

  } catch (err) {
    console.error('Analytics error:', err);
    document.querySelectorAll('.loading').forEach(el => {
      el.textContent = '⚠ Не вдалося завантажити дані';
    });
  }
}

function showChart(id, config) {
  const loading = document.getElementById(`loading-${id}`);
  const canvas  = document.getElementById(`chart-${id}`);
  loading.style.display = 'none';
  canvas.style.display  = 'block';
  new Chart(canvas, config);
}

loadAnalytics();
</script>

</body>
</html>
