{% extends "base.html" %}
{% block title %}Графік роботи | VetFuture{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-6">
  <h2 class="text-3xl font-bold text-red-600 mb-4">Графік роботи лікарів</h2>
  
  <div class="flex flex-wrap gap-2 mb-6">
    <button onclick="switchPeriod('today')" id="btn-today" class="px-4 py-2 bg-red-100 text-red-700 rounded-full font-medium">Сьогодні</button>
    <button onclick="switchPeriod('3days')" id="btn-3days" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full">3 дні</button>
    <button onclick="switchPeriod('week')" id="btn-week" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full">Тиждень</button>
  </div>

  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse min-w-[600px]">
        <thead id="schedule-header" class="bg-red-50 text-red-700 text-sm uppercase"></thead>
        <tbody id="schedule-body" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <div id="loading-msg" class="text-center py-12 text-gray-400">Завантаження…</div>
  </div>
</div>

<script>
let scheduleData = [];
let currentPeriod = 'today';

async function loadSchedule() {
  try {
    const res = await fetch('/api/schedule');
    scheduleData = await res.json();
    document.getElementById('loading-msg').classList.add('hidden');
    // Якщо на сьогодні немає даних, пробуємо знайти найближчий день
    const today = formatDate(new Date());
    if (!scheduleData.some(e => e.date === today && e.works)) {
      const futureDates = [...new Set(scheduleData.filter(e => e.works).map(e => e.date))].sort();
      if (futureDates.length > 0) {
        document.getElementById('loading-msg').innerHTML = `<span class="text-yellow-600">На сьогодні даних немає. Показано найближчий доступний день: ${futureDates[0]}</span>`;
      }
    }
    renderSchedule();
  } catch (e) {
    document.getElementById('loading-msg').innerHTML = '<span class="text-red-500">Помилка завантаження даних</span>';
  }
}

function getDates(period) {
  const today = new Date();
  const dates = [];
  if (period === 'today') {
    dates.push(formatDate(today));
  } else if (period === '3days') {
    for (let i = 0; i < 3; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      dates.push(formatDate(d));
    }
  } else if (period === 'week') {
    const dayOfWeek = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      dates.push(formatDate(d));
    }
  }
  return dates;
}

function formatDate(date) {
  return date.toISOString().slice(0,10);
}

function renderSchedule() {
  const dates = getDates(currentPeriod);
  const daysOfWeek = dates.map(d => {
    const day = new Date(d).toLocaleDateString('uk-UA', { weekday: 'short' });
    const dayNum = new Date(d).getDate();
    const month = new Date(d).toLocaleDateString('uk-UA', { month: 'short' });
    return `${day} ${dayNum} ${month}`;
  });

  let header = '<tr>';
  header += '<th class="py-3 px-4 font-semibold w-40">Лікар</th>';
  daysOfWeek.forEach(day => {
    header += `<th class="py-3 px-4 font-semibold text-center">${day}</th>`;
  });
  header += '</tr>';
  document.getElementById('schedule-header').innerHTML = header;

  const doctorMap = new Map();
  scheduleData.forEach(item => {
    if (!dates.includes(item.date)) return;
    if (!item.works) return;
    if (!doctorMap.has(item.doctor)) {
      doctorMap.set(item.doctor, new Map());
    }
    doctorMap.get(item.doctor).set(item.date, {
      start: item.start,
      end: item.end
    });
  });

  let body = '';
  if (doctorMap.size === 0) {
    body = `<tr><td colspan="${dates.length + 1}" class="py-8 text-center text-gray-400">Немає даних для вибраного періоду</td></tr>`;
  } else {
    for (let [doctor, dateSlots] of doctorMap) {
      body += `<tr class="hover:bg-gray-50"><td class="py-3 px-4 font-medium text-gray-800">${doctor}</td>`;
      dates.forEach(date => {
        const slot = dateSlots.get(date);
        if (slot && slot.start && slot.end) {
          body += `<td class="py-3 px-4 text-center"><span class="bg-green-50 text-green-700 px-2 py-1 rounded text-sm font-medium">${slot.start} – ${slot.end}</span></td>`;
        } else {
          body += `<td class="py-3 px-4 text-center text-gray-300">—</td>`;
        }
      });
      body += '</tr>';
    }
  }
  document.getElementById('schedule-body').innerHTML = body;
}

function switchPeriod(period) {
  currentPeriod = period;
  ['today','3days','week'].forEach(p => {
    const btn = document.getElementById('btn-' + p);
    btn.className = p === period
      ? 'px-4 py-2 bg-red-100 text-red-700 rounded-full font-medium'
      : 'px-4 py-2 bg-gray-100 text-gray-700 rounded-full';
  });
  renderSchedule();
}

loadSchedule();
</script>
{% endblock %}
