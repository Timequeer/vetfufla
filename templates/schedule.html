{% extends "base.html" %}
{% block title %}Графік роботи | VetFuture{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-6">
  <h2 class="text-3xl font-bold text-red-600 mb-4">Графік роботи лікарів</h2>

  <!-- Панель керування -->
  <div class="flex flex-wrap items-center gap-2 mb-6">
    <button onclick="switchPeriod('today')" id="btn-today" class="px-4 py-2 bg-red-100 text-red-700 rounded-full font-medium">Сьогодні</button>
    <button onclick="switchPeriod('3days')" id="btn-3days" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full">3 дні</button>
    <button onclick="switchPeriod('week')" id="btn-week" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full">Тиждень</button>
    <span class="ml-auto text-sm text-gray-500" id="date-range-label"></span>
  </div>

  <!-- Повідомлення про архів -->
  <div id="archive-hint" class="hidden bg-yellow-50 text-yellow-700 px-4 py-2 rounded-lg mb-4 text-sm"></div>

  <!-- Таблиця-графік -->
  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse min-w-[600px]">
        <thead id="schedule-header" class="bg-red-50 text-red-700 text-sm uppercase"></thead>
        <tbody id="schedule-body" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <div id="loading-msg" class="text-center py-12 text-gray-400">Завантаження…</div>
  </div>
</div>

<script>
let scheduleData = [];
let currentPeriod = 'today';
let customDate = null;

// ========== КЕШУВАННЯ (localStorage) ==========
const CACHE_KEY = 'vetfuture_schedule_cache';
const CACHE_DURATION = 10 * 60 * 1000; // 10 хвилин

function getCache() {
    try {
        const item = localStorage.getItem(CACHE_KEY);
        if (!item) return null;
        const parsed = JSON.parse(item);
        if (Date.now() - parsed.timestamp > CACHE_DURATION) {
            localStorage.removeItem(CACHE_KEY);
            return null;
        }
        return parsed.data;
    } catch (e) {
        return null;
    }
}

function setCache(data) {
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
            timestamp: Date.now(),
            data: data
        }));
    } catch (e) { /* переповнений localStorage */ }
}

async function loadSchedule() {
  try {
    // Спочатку пробуємо взяти з кешу
    const cached = getCache();
    if (cached) {
        scheduleData = cached;
        processLoadedData();
        return;
    }

    // Якщо кешу немає — завантажуємо з API
    const res = await fetch('/api/schedule');
    if (!res.ok) throw new Error('Network error');
    scheduleData = await res.json();
    setCache(scheduleData);
    processLoadedData();
  } catch (e) {
    document.getElementById('loading-msg').innerHTML = '<span class="text-red-500">Помилка завантаження даних</span>';
  }
}

function processLoadedData() {
    document.getElementById('loading-msg').classList.add('hidden');

    // Якщо сьогодні немає даних — показуємо останню доступну дату
    const todayStr = formatDate(new Date());
    if (!scheduleData.some(item => item.date === todayStr && item.works)) {
      const allDates = [...new Set(scheduleData.map(item => item.date))].sort();
      if (allDates.length > 0) {
        const lastDate = allDates[allDates.length - 1];
        document.getElementById('archive-hint').classList.remove('hidden');
        document.getElementById('archive-hint').textContent = 
          `Наразі графік недоступний для сьогодні. Показано архів за ${formatDisplayDate(lastDate)}.`;
        currentPeriod = 'custom';
        customDate = lastDate;
        renderScheduleForCustomDate(lastDate);
        return;
      }
    }
    renderSchedule();
}

function formatDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDisplayDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: 'long', year: 'numeric' });
}

function getDates(period) {
  const today = new Date();
  const dates = [];
  if (period === 'today') {
    dates.push(formatDate(today));
  } else if (period === '3days') {
    for (let i = 0; i < 3; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      dates.push(formatDate(d));
    }
  } else if (period === 'week') {
    const dayOfWeek = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      dates.push(formatDate(d));
    }
  }
  return dates;
}

function renderScheduleForCustomDate(dateStr) {
  const dates = [dateStr];
  document.getElementById('date-range-label').textContent = formatDisplayDate(dateStr);
  renderTable(dates);
}

function renderSchedule() {
  if (currentPeriod === 'custom') return;
  const dates = getDates(currentPeriod);
  const start = new Date(dates[0]);
  const end = new Date(dates[dates.length-1]);
  document.getElementById('date-range-label').textContent = 
    `${start.toLocaleDateString('uk-UA', {day:'numeric', month:'short'})} – ${end.toLocaleDateString('uk-UA', {day:'numeric', month:'short'})}`;
  renderTable(dates);
}

function renderTable(dates) {
  // Заголовки
  let header = '<tr><th class="py-3 px-4 w-40 font-semibold">Лікар</th>';
  dates.forEach(d => {
    const day = new Date(d).toLocaleDateString('uk-UA', { weekday: 'short' });
    const dayNum = new Date(d).getDate();
    const month = new Date(d).toLocaleDateString('uk-UA', { month: 'short' });
    header += `<th class="py-3 px-4 font-semibold text-center">${day} ${dayNum} ${month}</th>`;
  });
  header += '</tr>';
  document.getElementById('schedule-header').innerHTML = header;

  // Групуємо по лікарям
  const doctorMap = new Map();
  scheduleData.forEach(item => {
    if (!dates.includes(item.date)) return;
    if (!item.works) return;
    if (!doctorMap.has(item.doctor)) {
      doctorMap.set(item.doctor, new Map());
    }
    // Витягуємо лише години
    const startTime = item.start ? item.start.slice(11,16) : '';
    const endTime = item.end ? item.end.slice(11,16) : '';
    doctorMap.get(item.doctor).set(item.date, { start: startTime, end: endTime });
  });

  let body = '';
  if (doctorMap.size === 0) {
    body = `<tr><td colspan="${dates.length + 1}" class="py-8 text-center text-gray-400">Немає даних</td></tr>`;
  } else {
    for (let [doctor, dateSlots] of doctorMap) {
      body += `<tr class="hover:bg-gray-50"><td class="py-3 px-4 font-medium text-gray-800">${doctor}</td>`;
      dates.forEach(date => {
        const slot = dateSlots.get(date);
        if (slot && slot.start && slot.end) {
          body += `<td class="py-3 px-4 text-center">
            <span class="inline-block bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-semibold">
              ${slot.start} – ${slot.end}
            </span>
          </td>`;
        } else {
          body += `<td class="py-3 px-4 text-center text-gray-300">—</td>`;
        }
      });
      body += '</tr>';
    }
  }
  document.getElementById('schedule-body').innerHTML = body;
}

function switchPeriod(period) {
  currentPeriod = period;
  customDate = null;
  ['today','3days','week'].forEach(p => {
    const btn = document.getElementById('btn-' + p);
    btn.className = p === period 
      ? 'px-4 py-2 bg-red-100 text-red-700 rounded-full font-medium'
      : 'px-4 py-2 bg-gray-100 text-gray-700 rounded-full';
  });
  document.getElementById('archive-hint').classList.add('hidden');
  renderSchedule();
}

loadSchedule();
</script>
{% endblock %}
