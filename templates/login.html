<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - VetFuture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #2ecc71;
            margin-bottom: 30px;
        }

        .logo span {
            color: #f39c12;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #27ae60;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .error {
            background: #fee;
            color: #c00;
        }

        .success {
            background: #efe;
            color: #2ecc71;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #2ecc71;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Vet<span>Future</span></div>
        <h2>Вхід до кабінету</h2>
        
        <div id="step1">
            <input type="tel" id="phone" placeholder="+380XXXXXXXXX">
            <button onclick="sendCode()">Отримати код</button>
        </div>
        
        <div id="step2" style="display:none;">
            <input type="text" id="code" placeholder="Введіть код">
            <button onclick="verifyCode()">Увійти</button>
        </div>
        
        <div id="message" class="message"></div>
        <div class="back-link"><a href="/">← На головну</a></div>
    </div>

    <script>
        let currentPhone = '';
        
        function sendCode() {
            let phone = document.getElementById('phone').value;
            
            if (!phone) {
                showMessage('Введіть номер телефону', 'error');
                return;
            }
            
            fetch('/api/auth/send-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({phone: phone})
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.error) {
                    showMessage(data.error, 'error');
                } else {
                    currentPhone = phone;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    showMessage('Код надіслано! Перевірте консоль PowerShell', 'success');
                }
            })
            .catch(function(error) {
                showMessage('Помилка: ' + error, 'error');
            });
        }
        
        function verifyCode() {
            let code = document.getElementById('code').value;
            
            if (!code) {
                showMessage('Введіть код', 'error');
                return;
            }
            
            fetch('/api/auth/verify-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({phone: currentPhone, code: code})
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.error) {
                    showMessage(data.error, 'error');
                } else {
                    showMessage('Вхід успішний!', 'success');
                    setTimeout(function() {
                        if (data.user.is_doctor) {
                            window.location.href = '/doctor';
                        } else {
                            window.location.href = '/dashboard';
                        }
                    }, 1000);
                }
            })
            .catch(function(error) {
                showMessage('Помилка: ' + error, 'error');
            });
        }
        
        function showMessage(msg, type) {
            var div = document.getElementById('message');
            div.innerHTML = msg;
            div.className = 'message ' + type;
            
            setTimeout(function() {
                if (div.innerHTML === msg) {
                    div.innerHTML = '';
                    div.className = 'message';
                }
            }, 5000);
        }
    </script>
</body>
</html>
